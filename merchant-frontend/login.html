<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商户登录 - IO011 商户端</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand: #10B981; }
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-1/4 -left-20 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md px-6">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-emerald-500 flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4">IO</div>
      <h1 class="text-2xl font-bold text-white">商户端登录</h1>
      <p class="text-gray-400 mt-2">IO011 AI Commerce · 我的数据我做主</p>
    </div>

    <div class="bg-gray-800/50 backdrop-blur-xl rounded-2xl p-8 border border-gray-700">
      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">商户ID</label>
          <input type="text" id="merchantId" value="test" required
            class="w-full px-4 py-3 bg-gray-700/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:border-emerald-500"
            placeholder="请输入商户ID">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">密码</label>
          <input type="password" id="password" value="123456" required
            class="w-full px-4 py-3 bg-gray-700/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:border-emerald-500"
            placeholder="请输入密码">
        </div>

        <div id="errorMsg" class="hidden text-red-400 text-sm text-center bg-red-500/10 rounded-lg py-2">
          商户ID或密码错误
        </div>

        <button type="submit"
          class="w-full py-3 px-4 bg-emerald-500 hover:bg-emerald-600 text-white font-medium rounded-xl transition-all">
          登录
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-gray-700">
        <p class="text-center text-sm text-gray-500">测试账号（直接点击登录）</p>
        <div class="mt-3 grid grid-cols-2 gap-3 text-sm">
          <div class="bg-gray-700/30 rounded-lg p-3 text-center">
            <p class="text-gray-400">商户ID</p>
            <p class="text-white font-medium">test</p>
          </div>
          <div class="bg-gray-700/30 rounded-lg p-3 text-center">
            <p class="text-gray-400">密码</p>
            <p class="text-white font-medium">123456</p>
          </div>
        </div>
      </div>
    </div>

    <p class="text-center text-gray-500 text-sm mt-8">
      © 2026 IO011 AI Commerce
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const merchantId = document.getElementById('merchantId').value;
      const password = document.getElementById('password').value;

      // 简单验证：test/123456
      if (merchantId === 'test' && password === '123456') {
        // 保存登录状态
        localStorage.setItem('merchant_token', JSON.stringify({
          merchantId: merchantId,
          shopName: '测试商户',
          loginAt: Date.now()
        }));
        // 跳转到仪表盘
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
