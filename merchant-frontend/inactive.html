<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下架商品 - IO011 商户端</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand: #10B981; }
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-900 min-h-screen text-gray-100">
  <!-- 侧边栏 -->
  <aside class="fixed left-0 top-0 w-64 h-screen bg-gray-800 border-r border-gray-700 p-4 z-50">
    <div class="flex items-center gap-3 mb-8 px-2">
      <img src="green-logo.png" alt="IO011" class="h-10 w-auto rounded-xl" style="width: 40px; height: 40px; object-fit: contain; background: #10B981;" onerror="this.style.background='#10B981';this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect fill=%22%2310B981%22 width=%2240%22 height=%2240%22 rx=%228%22/><text x=%2220%22 y=%2226%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2216%22 font-weight=%22bold%22>IO</text></svg>'"/>
      <div>
        <span class="text-white font-bold">IO011</span>
        <span class="text-xs text-emerald-400 block">商户端</span>
      </div>
    </div>
    
    <nav class="space-y-1">
      <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        <span>仪表盘</span>
      </a>
      <a href="index.html#products" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        <span>商品管理</span>
      </a>
      <a href="#inactive" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-500/20 text-emerald-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
        <span>下架商品</span>
      </a>
      <a href="orders.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
        <span>订单管理</span>
      </a>
    </nav>

    <div class="absolute bottom-4 left-4 right-4">
      <div class="bg-gray-700/50 rounded-xl p-4">
        <p class="text-xs text-gray-400 mb-2">商户状态</p>
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
          <span class="text-sm text-green-400" id="shopName">营业中</span>
        </div>
      </div>
      <button onclick="logout()" class="mt-3 w-full py-2 px-4 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-xl text-sm transition-colors">
        退出登录
      </button>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="ml-64 p-8">
    <header class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-white">下架商品</h1>
        <p class="text-gray-400 text-sm mt-1">已下架的商品，可以重新上架</p>
      </div>
      <a href="index.html#products" class="flex items-center gap-2 px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-xl transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        返回在售商品
      </a>
    </header>

    <div class="bg-gray-800 rounded-2xl p-6">
      <div class="mb-6">
        <span class="text-gray-400">共 </span>
        <span class="text-emerald-400 font-bold" id="inactiveCount">0</span>
        <span class="text-gray-400"> 件下架商品</span>
      </div>
      
      <div id="productList" class="grid md:grid-cols-3 lg:grid-cols-4 gap-4">
      </div>
      
      <div id="emptyState" class="hidden text-center py-12">
        <svg class="w-16 h-16 mx-auto text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
        <p class="text-gray-400">没有下架商品</p>
        <a href="index.html#products" class="mt-4 text-emerald-400 hover:text-emerald-300 inline-block">返回商品管理</a>
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'io011_products';

    document.addEventListener('DOMContentLoaded', function() {
      checkLogin();
      loadProducts();
    });

    function checkLogin() {
      const token = localStorage.getItem('merchant_token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }
      const data = JSON.parse(token);
      document.getElementById('shopName').textContent = data.shopName;
    }

    function logout() {
      localStorage.removeItem('merchant_token');
      window.location.href = 'login.html';
    }

    function getProducts() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }

    function loadProducts() {
      const products = getProducts().filter(p => p.status === 'inactive');
      const container = document.getElementById('productList');
      const emptyState = document.getElementById('emptyState');
      
      document.getElementById('inactiveCount').textContent = products.length;

      if (products.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
        container.innerHTML = products.map(p => `
          <div class="bg-gray-700/50 rounded-xl p-4 opacity-75 hover:opacity-100 transition-opacity">
            <div class="w-full h-32 bg-gray-600 rounded-lg mb-3 flex items-center justify-center overflow-hidden">
              ${p.image ? `<img src="${p.image}" class="w-full h-full object-cover">` : 
                `<svg class="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`}
            </div>
            <h4 class="font-medium text-white truncate">${p.name}</h4>
            <p class="text-gray-400 font-bold mt-1">¥${parseFloat(p.price).toFixed(2)}</p>
            <p class="text-gray-500 text-xs mt-1">${p.category}</p>
            <div class="flex gap-2 mt-3">
              <button onclick="deleteProduct('${p.id}')" class="flex-1 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-400 text-sm rounded-lg transition-colors">删除</button>
              <button onclick="toggleStatus('${p.id}')" class="flex-1 py-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm rounded-lg transition-colors">重新上架</button>
            </div>
          </div>
        `).join('');
      }
    }

    function toggleStatus(id) {
      const products = getProducts();
      const index = products.findIndex(p => p.id === id);
      if (index > -1) {
        products[index].status = 'active';
        products[index].updatedAt = Date.now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
        loadProducts();
        // 提示成功
        alert('商品已重新上架！');
      }
    }

    function deleteProduct(id) {
      if (confirm('确定要删除这个商品吗？此操作不可恢复。')) {
        const products = getProducts().filter(p => p.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
        loadProducts();
      }
    }
  </script>
</body>
</html>
