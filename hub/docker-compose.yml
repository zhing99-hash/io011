version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: aicart-postgres
    environment:
      POSTGRES_DB: aicart_hub
      POSTGRES_USER: aicart
      POSTGRES_PASSWORD: aicart123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicart -d aicart_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aicart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hub:
    build: .
    container_name: aicart-hub
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=aicart_hub
      - DB_USER=aicart
      - DB_PASSWORD=aicart123456
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./.env:/app/.env

volumes:
  postgres_data:
  redis_data: