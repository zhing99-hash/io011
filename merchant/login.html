<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>е•ҶжҲ·зҷ»еҪ• - IO011 е•ҶжҲ·з«Ҝ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="js/api.js"></script>
  <style>
    :root {
      --brand: #10B981;
      --brand-dark: #059669;
      --brand-light: #34D399;
    }
    body { font-family: 'Inter', sans-serif; }
    .brand-gradient { background: linear-gradient(135deg, var(--brand), var(--brand-light)); }
  </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-1/4 -left-20 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-md px-6">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl brand-gradient mb-4">
        <img src="green-logo.png" alt="IO011" class="w-10 h-10 rounded-xl" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" style="display:none">
        <svg class="w-8 h-8 text-white" style="display:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">е•ҶжҲ·з«Ҝзҷ»еҪ•</h1>
      <p class="text-gray-400 mt-2">IO011 AI Commerce В· жҲ‘зҡ„ж•°жҚ®жҲ‘еҒҡдё»</p>
    </div>

    <div class="bg-gray-800/50 backdrop-blur-xl rounded-2xl p-8 border border-gray-700">
      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">е•ҶжҲ·ID</label>
          <input type="text" id="merchantId" required
            class="w-full px-4 py-3 bg-gray-700/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors"
            placeholder="иҜ·иҫ“е…Ҙе•ҶжҲ·ID">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">еҜҶз Ғ</label>
          <input type="password" id="password" required
            class="w-full px-4 py-3 bg-gray-700/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors"
            placeholder="иҜ·иҫ“е…ҘеҜҶз Ғ">
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2">
            <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-emerald-500 focus:ring-emerald-500">
            <span class="text-sm text-gray-400">и®°дҪҸзҷ»еҪ•</span>
          </label>
        </div>

        <div id="errorMsg" class="hidden text-red-400 text-sm text-center bg-red-500/10 rounded-lg py-2">
          зҷ»еҪ•еӨұиҙҘпјҢиҜ·жЈҖжҹҘе•ҶжҲ·IDе’ҢеҜҶз Ғ
        </div>

        <div id="loading" class="hidden text-center py-2">
          <svg class="animate-spin h-6 w-6 mx-auto text-emerald-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <p class="text-gray-400 text-sm mt-2">зҷ»еҪ•дёӯ...</p>
        </div>

        <button type="submit" id="submitBtn"
          class="w-full py-3 px-4 bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-medium rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
          зҷ»еҪ•
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-gray-700">
        <p class="text-center text-sm text-gray-500">жөӢиҜ•иҙҰеҸ·пјҲжң¬ең°жЁЎејҸпјү</p>
        <div class="mt-3 grid grid-cols-2 gap-3 text-sm">
          <div class="bg-gray-700/30 rounded-lg p-3 text-center">
            <p class="text-gray-400">е•ҶжҲ·ID</p>
            <p class="text-white font-medium">test</p>
          </div>
          <div class="bg-gray-700/30 rounded-lg p-3 text-center">
            <p class="text-gray-400">еҜҶз Ғ</p>
            <p class="text-white font-medium">123456</p>
          </div>
        </div>
        <p class="text-xs text-gray-500 mt-3 text-center">
          * жң¬ең°жөӢиҜ•жЁЎејҸпјҢж•°жҚ®еӯҳеӮЁеңЁжөҸи§ҲеҷЁlocalStorage
        </p>
      </div>
    </div>

    <p class="text-center text-gray-500 text-sm mt-8">
      В© 2026 IO011 AI Commerce
    </p>
  </div>

  <script>
    // дёҙж—¶ејәеҲ¶з”ҹдә§жЁЎејҸз”ЁдәҺи°ғиҜ•
    // еҲ йҷӨдёӢйқўиҝҷиЎҢе°ұиғҪжҒўеӨҚжӯЈеёё
    // const isLocalMode = false; // ејәеҲ¶з”ҹдә§
    
    // жЈҖжөӢжҳҜеҗҰдёәжң¬ең°жөӢиҜ•жЁЎејҸ
    const isLocalMode = false; // зӣҙжҺҘејәеҲ¶дёәз”ҹдә§жЁЎејҸ

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const merchantId = document.getElementById('merchantId').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const loading = document.getElementById('loading');
      const submitBtn = document.getElementById('submitBtn');

      errorMsg.classList.add('hidden');
      
      // жҳҫзӨәеҠ иҪҪзҠ¶жҖҒ
      loading.classList.remove('hidden');
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50');

      try {
        if (isLocalMode) {
          // жң¬ең°жөӢиҜ•жЁЎејҸ - дҪҝз”Ёжң¬ең°йӘҢиҜҒ
          await localLogin(merchantId, password);
        } else {
          // з”ҹдә§жЁЎејҸ - еҜ№жҺҘзңҹе®һAPI
          await productionLogin(merchantId, password);
        }
      } catch (error) {
        console.error('Login error:', error);
        errorMsg.textContent = error.message || 'зҷ»еҪ•еӨұиҙҘпјҢиҜ·жЈҖжҹҘе•ҶжҲ·IDе’ҢеҜҶз Ғ';
        errorMsg.classList.remove('hidden');
      } finally {
        loading.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50');
      }
    });

    // жң¬ең°жөӢиҜ•жЁЎејҸзҷ»еҪ•
    async function localLogin(merchantId, password) {
      // жөӢиҜ•иҙҰеҸ·
      const TEST_MERCHANTS = [
        { id: 'mer_test001', password: '123456', shopName: 'жөӢиҜ•е•ҶжҲ·A' },
        { id: 'mer_test002', password: '123456', shopName: 'жөӢиҜ•е•ҶжҲ·B' },
        { id: 'test', password: '123456', shopName: 'жөӢиҜ•е•ҶжҲ·' }
      ];

      const merchant = TEST_MERCHANTS.find(m => m.id === merchantId && m.password === password);

      if (merchant) {
        // дҝқеӯҳзҷ»еҪ•зҠ¶жҖҒ
        localStorage.setItem('merchant_token', JSON.stringify({
          merchantId: merchant.id,
          shopName: merchant.shopName,
          loginAt: Date.now(),
          isLocalMode: true
        }));
        
        // дҝқеӯҳеҲ° API й…ҚзҪ®
        IO011API.init(merchant.id, 'local-token');
        
        window.location.href = 'dashboard.html';
      } else {
        throw new Error('е•ҶжҲ·IDжҲ–еҜҶз Ғй”ҷиҜҜ');
      }
    }

    // з”ҹдә§жЁЎејҸзҷ»еҪ• (еҜ№жҺҘзңҹе®һAPI)
    async function productionLogin(merchantId, password) {
      const result = await IO011API.login(merchantId, password);
      
      if (result.success) {
        // дҝқеӯҳзҷ»еҪ•зҠ¶жҖҒ
        localStorage.setItem('merchant_token', JSON.stringify({
          merchantId: merchantId,
          shopName: result.merchant?.name || 'е•ҶжҲ·',
          loginAt: Date.now(),
          isLocalMode: false,
          apiKey: result.token // дҝқеӯҳ API token
        }));
        
        window.location.href = 'dashboard.html';
      } else {
        throw new Error(result.message || 'зҷ»еҪ•еӨұиҙҘ');
      }
    }
  </script>
</body>
</html>
