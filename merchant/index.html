<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品管理 - IO011 商户端</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="js/api.js"></script>
  <style>
    :root { --brand: #10B981; }
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-900 min-h-screen text-gray-100">
  <!-- 侧边栏 -->
  <aside class="fixed left-0 top-0 w-64 h-screen bg-gray-800 border-r border-gray-700 p-4 z-50">
    <div class="flex items-center gap-3 mb-8 px-2">
      <img src="green-logo.png" alt="IO011" class="h-10 w-auto rounded-xl" style="width: 40px; height: 40px; object-fit: contain; background: #10B981;">
      <div>
        <span class="text-white font-bold">IO011</span>
        <span class="text-xs text-emerald-400 block">商户端</span>
      </div>
    </div>
    
    <nav class="space-y-1">
      <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        <span>仪表盘</span>
      </a>
      <a href="#products" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-500/20 text-emerald-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        <span>商品管理</span>
      </a>
      <a href="inactive.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
        <span>下架商品</span>
      </a>
      <a href="orders.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
        <span>订单管理</span>
      </a>
    </nav>

    <div class="absolute bottom-4 left-4 right-4">
      <div class="bg-gray-700/50 rounded-xl p-4">
        <p class="text-xs text-gray-400 mb-2">商户状态</p>
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
          <span class="text-sm text-green-400" id="shopName">-</span>
        </div>
      </div>
      <button onclick="logout()" class="mt-3 w-full py-2 px-4 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-xl text-sm transition-colors">
        退出登录
      </button>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="ml-64 p-8">
    <header class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-white">商品管理</h1>
        <p class="text-gray-400 text-sm mt-1" id="headerShopName">管理您的商品</p>
      </div>
      <div class="flex items-center gap-4">
        <span class="px-3 py-1 bg-green-500/20 text-green-400 text-xs rounded-full">运营中</span>
        <button onclick="showAddModal()" class="flex items-center gap-2 px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          添加商品
        </button>
      </div>
    </header>

    <!-- 统计 -->
    <div class="grid md:grid-cols-4 gap-6 mb-8">
      <div class="bg-gray-800 rounded-2xl p-6">
        <p class="text-gray-400 text-sm">在售商品</p>
        <p class="text-3xl font-bold text-white mt-1" id="activeCount">0</p>
      </div>
      <div class="bg-gray-800 rounded-2xl p-6">
        <p class="text-gray-400 text-sm">已下架</p>
        <p class="text-3xl font-bold text-white mt-1" id="inactiveCount">0</p>
      </div>
      <div class="bg-gray-800 rounded-2xl p-6">
        <p class="text-gray-400 text-sm">类目数</p>
        <p class="text-3xl font-bold text-white mt-1" id="categoryCount">0</p>
      </div>
      <div class="bg-gray-800 rounded-2xl p-6">
        <p class="text-gray-400 text-sm">总商品价值</p>
        <p class="text-3xl font-bold text-emerald-400 mt-1" id="totalValue">¥0</p>
      </div>
    </div>

    <!-- 商品列表 -->
    <div id="products" class="bg-gray-800 rounded-2xl p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="font-semibold text-white">在售商品</h3>
      </div>
      
      <div id="productList" class="grid md:grid-cols-3 lg:grid-cols-4 gap-4">
      </div>
    </div>
  </main>

  <script>
    // 演示数据
    const DEMO_PRODUCTS = [
      { id: 'p1', name: 'HUAWEI Mate 60 Pro', price: 6999, category: '数码', status: 'active', description: '旗舰手机' },
      { id: 'p2', name: '华为手表 GT4', price: 1688, category: '数码', status: 'active', description: '智能手表' },
      { id: 'p3', name: 'FreeBuds Pro 3', price: 1499, category: '数码', status: 'active', description: '降噪耳机' },
      { id: 'p4', name: 'MatePad Pro', price: 4999, category: '数码', status: 'active', description: '平板电脑' },
    ];

    let allProducts = [];

    document.addEventListener('DOMContentLoaded', function() {
      const token = localStorage.getItem('merchant_token');
      if (!token) {
        // 如果没有登录，使用演示数据
        loadDemoProducts();
        return;
      }
      
      try {
        const tokenData = JSON.parse(token);
        document.getElementById('shopName').textContent = tokenData.shopName || '商户';
        document.getElementById('headerShopName').textContent = tokenData.shopName || '管理您的商品';
      } catch(e) {}
      
      // 无论有没有登录，都加载演示数据
      loadDemoProducts();
    });

    function loadDemoProducts() {
      allProducts = DEMO_PRODUCTS;
      render();
    }

    function render() {
      const active = allProducts.filter(p => p.status === 'active');
      const categories = [...new Set(active.map(p => p.category))];
      const totalValue = active.reduce((sum, p) => sum + parseFloat(p.price), 0);

      document.getElementById('activeCount').textContent = active.length;
      document.getElementById('inactiveCount').textContent = allProducts.filter(p => p.status === 'inactive').length;
      document.getElementById('categoryCount').textContent = categories.length;
      document.getElementById('totalValue').textContent = '¥' + totalValue.toLocaleString();

      const container = document.getElementById('productList');
      container.innerHTML = active.map(p => `
        <div class="bg-gray-700/50 rounded-xl p-4 hover:bg-gray-700 transition-colors">
          <div class="w-full h-32 bg-gray-600 rounded-lg mb-3 flex items-center justify-center">
            <span class="text-4xl">📦</span>
          </div>
          <h4 class="font-medium text-white truncate">${p.name}</h4>
          <p class="text-emerald-400 font-bold mt-1">¥${p.price.toLocaleString()}</p>
          <p class="text-gray-500 text-xs mt-1">${p.category}</p>
        </div>
      `).join('');
    }

    function logout() {
      localStorage.removeItem('merchant_token');
      window.location.href = 'login.html';
    }

    function showAddModal() {
      alert('演示模式：添加商品功能已简化');
    }
  </script>
</body>
</html>
